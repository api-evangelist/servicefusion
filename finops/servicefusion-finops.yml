description: >-
  FinOps view of Service Fusion spend. Service Fusion is a flat-rate SaaS
  subscription, not usage-metered - cost is the monthly (or annual) plan fee for
  one of three tiers (Starter, Plus, Pro), each with unlimited users, so spend
  does not scale with technician headcount or the number of jobs, estimates, or
  invoices processed. The Open API carries no separate per-call charge; it is a
  feature bundled into the Pro plan and is governed by a rate limit (~60
  requests/minute) rather than metered billing. The relevant FinOps decisions
  are therefore tier selection (does the organization need Pro-only capabilities
  such as API access, eSignatures, and customer portals) and annual-versus-
  monthly commitment, not per-unit consumption optimization.
notes: >-
  Because pricing is flat-rate and unlimited-user, the dominant cost lever is
  choosing the right tier and billing term, not reducing API call volume. If API
  access is required, the organization must be on the Pro plan; there is no way
  to buy the API separately. Confirm current tier prices with Service Fusion, as
  list pricing is not published on their site.
