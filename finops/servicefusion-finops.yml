meters:
- name: subscription_tier
  description: Flat-rate monthly/annual subscription fee for the selected plan (Starter, Plus, or Pro).
  unit: subscription
  aggregation: flat
  dimensions:
  - account
  - plan
- name: users
  description: Number of users is unlimited on every plan and does not affect the subscription fee.
  unit: users
  aggregation: max
  dimensions:
  - account
- name: api_requests
  description: Open API requests are not billed per call; usage is governed by the rate limit, and API access is bundled into the Pro plan.
  unit: requests
  aggregation: sum
  dimensions:
  - account
principles:
- name: Visibility
  description: Track which subscription tier the organization is on and whether Pro-only features (API access, eSignatures, portals) are actually used to justify the tier.
- name: Allocation
  description: With unlimited flat-rate users, allocate the single subscription fee across departments by usage share rather than by seat count.
- name: Optimization
  description: Right-size the plan tier and prefer annual billing for the discount; API call volume does not drive cost, so optimize for correctness and rate-limit compliance rather than call reduction.
- name: Accountability
  description: Assign an owner for the Service Fusion subscription and review tier fit at renewal against the features actually consumed.
