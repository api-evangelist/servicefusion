aid: servicefusion
url: https://raw.githubusercontent.com/api-evangelist/servicefusion/refs/heads/main/apis.yml
name: Service Fusion
kind: company
description: Service Fusion is field service management (FSM) software for home-service
  contractors - HVAC, plumbing, electrical, appliance repair, and similar trades. It
  covers customer management, estimates, scheduling and dispatch, work orders/jobs,
  invoicing, payments, inventory, and a technician mobile app, with flat-rate pricing
  and unlimited users on every plan. Service Fusion exposes an Open API - a REST/JSON
  interface secured with OAuth 2.0 (base https://api.servicefusion.com/v1, token
  endpoint https://api.servicefusion.com/oauth/access_token) - that lets developers
  read and create records for customers, jobs, estimates, invoices, technicians, and
  related resources. API access is available on the Pro plan; the API is rate limited
  to roughly 60 requests per minute.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Field Service Management
- FSM
- Home Services
- Contractors
- Scheduling
- Dispatch
- Invoicing
created: '2026-07-03'
modified: '2026-07-03'
